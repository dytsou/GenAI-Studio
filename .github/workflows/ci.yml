name: CI and Deploy

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: deploy/gateway/pnpm-lock.yaml

      - name: Install gateway dependencies
        run: pnpm install --frozen-lockfile

      - name: Build gateway
        run: pnpm run build

      - name: Test gateway (unit)
        run: pnpm test

      - name: Test gateway (e2e harness)
        run: pnpm run test:e2e

      - name: Start Postgres (Compose, init.sql)
        working-directory: deploy
        run: docker compose up -d postgres

      - name: Wait for Postgres
        working-directory: deploy
        run: |
          for i in $(seq 1 60); do
            if docker compose exec -T postgres pg_isready -U postgres -d studio; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready"
          docker compose logs postgres
          exit 1

      - name: Test gateway (runtime Postgres e2e)
        working-directory: deploy/gateway
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/studio
        run: pnpm run test:e2e:runtime

  pages-build:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: [ quality, gateway ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Pages
        run: pnpm build --base "/${GITHUB_REPOSITORY#*/}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: pages-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
