name: Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get package version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current package version: $VERSION"

      - name: Get package name
        id: package-name
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Current package name: $PACKAGE_NAME"

      - name: Extract version from tag (if triggered by tag)
        id: tag-version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: Fetch all tags
        run: git fetch --tags

      - name: Check if tag exists
        id: check-tag
        run: |
          VERSION=${{ steps.package-version.outputs.version }}
          TAG_NAME="v$VERSION"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: |
          steps.check-tag.outputs.exists == 'false' &&
          !startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME=${{ steps.check-tag.outputs.tag_name }}
          VERSION=${{ steps.package-version.outputs.version }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG_NAME" -m "Release $VERSION"
          git push origin "$TAG_NAME"

          echo "Created and pushed tag: $TAG_NAME"

      - name: Verify package.json version matches tag (if triggered by tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${{ steps.tag-version.outputs.version }}
          PACKAGE_VERSION=${{ steps.package-version.outputs.version }}

          echo "Tag version: $TAG_VERSION"
          echo "Package.json version: $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Version mismatch! Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            echo "Please update package.json version to match the tag, or create a tag that matches the package.json version."
            exit 1
          fi

          echo "Version validation passed: $TAG_VERSION"

      - name: Determine release version
        id: release-version
        run: |
          if [ -n "${{ steps.tag-version.outputs.version }}" ]; then
            echo "version=${{ steps.tag-version.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.package-version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.release-version.outputs.version }}
          PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES="## Release $VERSION

          Initial release.

          ---
          *This release was automatically created by GitHub Actions*"
          else
            COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:'- %s' --no-merges)
            NOTES="## Release $VERSION

          ### Changes since $PREVIOUS_TAG

          $COMMITS

          ---
          *This release was automatically created by GitHub Actions*"
          fi

          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-tag.outputs.tag_name }}
          name: v${{ steps.release-version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.package-version.outputs.version, 'beta') || contains(steps.package-version.outputs.version, 'alpha') || contains(steps.package-version.outputs.version, 'rc') }}
          draft: false
