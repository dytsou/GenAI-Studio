services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studio
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/studio}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}

      # Optional bearer shared with SPA/Vite dev proxy helpers (see root `pnpm run setup:dev`).
      # The gateway does not enforce this by default; it's a convenience knob for local tooling.
      GATEWAY_BEARER_TOKEN: ${GATEWAY_BEARER_TOKEN:-}

      # Hardening / limits
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ALLOWED_UPSTREAM_ORIGINS: ${ALLOWED_UPSTREAM_ORIGINS:-}
      GATEWAY_BLOCK_PRIVATE_UPSTREAM: ${GATEWAY_BLOCK_PRIVATE_UPSTREAM:-}
      EXPRESS_JSON_LIMIT: ${EXPRESS_JSON_LIMIT:-}

      # Standard `/v1/chat` suitable-memory saves
      MEMORY_CHAT_SAVE_STRATEGY: ${MEMORY_CHAT_SAVE_STRATEGY:-facts}
      MEMORY_CHAT_FACTS_MAX_ITEMS: ${MEMORY_CHAT_FACTS_MAX_ITEMS:-}
      MEMORY_CHAT_FACT_MAX_CHARS: ${MEMORY_CHAT_FACT_MAX_CHARS:-}
      MEMORY_CHAT_FACTS_MAX_TOTAL_CHARS: ${MEMORY_CHAT_FACTS_MAX_TOTAL_CHARS:-}
      MEMORY_EXTRACTION_MODEL: ${MEMORY_EXTRACTION_MODEL:-}

      # Tools / MCP discovery (env catalogs)
      TOOLS_JSON: ${TOOLS_JSON:-[]}
      MCP_TOOLS_JSON: ${MCP_TOOLS_JSON:-[]}
    depends_on:
      postgres:
        condition: service_healthy
